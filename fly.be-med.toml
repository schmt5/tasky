# fly.toml app configuration file generated for tasky-be-med
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'tasky-be-med'
primary_region = 'fra'
kill_signal = 'SIGTERM'

[build]
  [build.args]
    MIX_ENV = 'demo'

[env]
  DATABASE_PATH = '/mnt/name/name.db'
  MIX_ENV = 'demo'
  PHX_HOST = 'tasky-be-med.fly.dev'
  PORT = '8080'

[[mounts]]
  source = 'name'
  destination = '/mnt/name'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
